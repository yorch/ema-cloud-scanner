name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check packages/
      - name: Ruff format
        run: uv run ruff format --check packages/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - name: Mypy type check
        run: uv run mypy packages/ema_cloud_lib/src/ema_cloud_lib/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short
      - name: Run CLI tests
        run: uv run pytest packages/ema_cloud_cli/tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Build packages
        run: |
          cd packages/ema_cloud_lib && uv build
          cd ../ema_cloud_cli && uv build
