[project]
name = "ema-cloud-lib"
version = "0.1.0"
description = "Core library for EMA Cloud trading analysis based on Ripster's methodology"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "EMA Cloud Scanner" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Financial and Insurance Industry",
    "Topic :: Office/Business :: Financial :: Investment",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pandas>=2.3.3",
    "numpy>=2.4.1",
    "yfinance>=1.0",
    "aiohttp>=3.13.3",
    "pydantic>=2.12.5",
    "pandas-market-calendars>=4.4.1",
]

[project.optional-dependencies]
alpaca = ["alpaca-py>=0.43.2"]
polygon = ["polygon-api-client>=1.16.3"]
notifications = ["plyer>=2.1.0"]
all = ["alpaca-py>=0.43.2", "polygon-api-client>=1.16.3", "plyer>=2.1.0"]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.14.11",
    "mypy>=1.19.1",
]

[build-system]
requires = ["setuptools>=80.9.0", "wheel>=0.45.1"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["*.json", "*.yaml", "*.yml"]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (handled by formatter)
    "B904", # exception chaining (minor in data providers)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["ema_cloud_lib"]
