[project]
name = "ema-cloud-cli"
version = "0.1.0"
description = "Command-line interface for EMA Cloud Sector Scanner"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "EMA Cloud Scanner" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Financial and Insurance Industry",
    "Topic :: Office/Business :: Financial :: Investment",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Environment :: Console",
]
dependencies = [
    "ema-cloud-lib>=0.1.0",
    "textual>=8.1.1",
    "typer>=0.24.1",
    "pydantic-settings>=2.13.1",
    "platformdirs>=4.9.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-mock>=3.15.1",
    "ruff>=0.15.6",
    "mypy>=1.19.1",
]

[project.scripts]
ema-scanner = "ema_cloud_cli.cli:run"

[build-system]
requires = ["setuptools>=82.0.1", "wheel>=0.46.3"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["ema_cloud_cli", "ema_cloud_lib"]
